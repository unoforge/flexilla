<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Demo</title>
</head>

<body class="pt14 bg-white dark:bg-zinc-950">
  <section class="max-w3xl mxauto space-y-14 relative z20 pb20">
    <header class="space-y-2">
      <h1 class="text-2xl font-semibold text-zinc-900 dark:text-white">Select</h1>
      <p class="text-zinc-600 dark:text-zinc-400">Headless select powered by @flexilla/select-core with DOM bindings.</p>
    </header>

    <div class="space-y-6">
      <div class="space-y-3">
        <h2 class="text-lg font-semibold text-zinc-900 dark:text-white">Single select</h2>
        <p class="text-sm text-zinc-600 dark:text-zinc-400">Uses trigger + list with keyboard navigation.</p>
      </div>
      <div id="demo-select" data-select data-demo-select class="inline-block relative">
        <button data-select-trigger data-select-id="demo-select" class="b b-zinc8 hover-bg-zinc-950 bg-zinc9 text-white px-4 py-2 rounded-lg text-sm">
          <span data-selected-value data-select-id="demo-select">Choose a fruit</span>
        </button>
        <div data-select-content data-select-id="demo-select" class="mt-2 w-56 border border-zinc-200 dark:border-zinc-800 rounded-lg bg-white dark:bg-zinc-900 shadow-sm" hidden>
          <ul class="py-1 text-sm text-zinc-800 dark:text-zinc-100">
            <li data-select-item="apple" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Apple</li>
            <li data-select-item="banana" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Banana</li>
            <li data-select-item="cherry" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Cherry</li>
            <li data-select-item="grape" data-disabled class="px-3 py-2 opacity-60 cursor-not-allowed">Grape (disabled)</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="space-y-6">
      <div class="space-y-3">
        <h2 class="text-lg font-semibold text-zinc-900 dark:text-white">Multi select</h2>
        <p class="text-sm text-zinc-600 dark:text-zinc-400">Toggle multiple values with Enter or click.</p>
      </div>
      <div id="demo-select-multi" data-select data-demo-select-multi class="inline-block relative">
        <button data-select-trigger data-select-id="demo-select-multi" class="b b-zinc8 hover-bg-zinc-950 bg-zinc9 text-white px-4 py-2 rounded-lg text-sm">
          <span data-selected-value data-select-id="demo-select-multi">Choose toppings</span>
        </button>
        <div data-select-content data-select-id="demo-select-multi" class="mt-2 w-60 border border-zinc-200 dark:border-zinc-800 rounded-lg bg-white dark:bg-zinc-900 shadow-sm" hidden>
          <ul class="py-1 text-sm text-zinc-800 dark:text-zinc-100">
            <li data-select-item="pepperoni" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Pepperoni</li>
            <li data-select-item="mushroom" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Mushroom</li>
            <li data-select-item="onion" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Onion</li>
            <li data-select-item="olive" class="px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded">Olive</li>
          </ul>
        </div>
      </div>
    </div>
  </section>
  <script type="module" src="./main.ts"></script>
</body>

</html>
