<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast - Flexilla</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="pt14 bg-white dark:bg-gray-950 min-h-screen">
  <main class="max-w-4xl mx-auto px-4 py-12 space-y-12">

    <section class="space-y-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Toast / Notifications</h1>
      <p class="text-gray-600 dark:text-gray-300">Click buttons to trigger different toast types.</p>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Types</h2>
      <div class="flex flex-wrap gap-3">
        <button data-toast="default" class="px-4 py-2 rounded-lg bg-neutral-800 text-white hover:bg-neutral-700 transition-colors">Default</button>
        <button data-toast="success" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-500 transition-colors">Success</button>
        <button data-toast="error" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 transition-colors">Error</button>
        <button data-toast="warning" class="px-4 py-2 rounded-lg bg-amber-600 text-white hover:bg-amber-500 transition-colors">Warning</button>
        <button data-toast="info" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 transition-colors">Info</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">With Description</h2>
      <div class="flex flex-wrap gap-3">
        <button data-toast="desc-success" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-500 transition-colors">Success</button>
        <button data-toast="desc-error" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 transition-colors">Error</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Positions</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <button data-toast="pos-top-right" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Top Right</button>
        <button data-toast="pos-top-left" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Top Left</button>
        <button data-toast="pos-top-center" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Top Center</button>
        <button data-toast="pos-bottom-right" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Bottom Right</button>
        <button data-toast="pos-bottom-left" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Bottom Left</button>
        <button data-toast="pos-bottom-center" class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Bottom Center</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Rich Colors</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Same as types but with richColors enabled.</p>
      <div class="flex flex-wrap gap-3">
        <button data-toast="rich-success" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-500 transition-colors">Success</button>
        <button data-toast="rich-error" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 transition-colors">Error</button>
        <button data-toast="rich-warning" class="px-4 py-2 rounded-lg bg-amber-600 text-white hover:bg-amber-500 transition-colors">Warning</button>
        <button data-toast="rich-info" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 transition-colors">Info</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">With Action Button</h2>
      <div class="flex flex-wrap gap-3">
        <button data-toast="action" class="px-4 py-2 rounded-lg bg-violet-600 text-white hover:bg-violet-500 transition-colors">Undo Action</button>
        <button data-toast="action-cancel" class="px-4 py-2 rounded-lg bg-violet-600 text-white hover:bg-violet-500 transition-colors">Action + Cancel</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Promise / Loading</h2>
      <div class="flex flex-wrap gap-3">
        <button data-toast="promise" class="px-4 py-2 rounded-lg bg-cyan-600 text-white hover:bg-cyan-500 transition-colors">Promise (2s)</button>
        <button data-toast="loading" class="px-4 py-2 rounded-lg bg-cyan-600 text-white hover:bg-cyan-500 transition-colors">Loading → Success</button>
      </div>
    </section>

    <section class="space-y-4">
      <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-200">Controls</h2>
      <div class="flex flex-wrap gap-3">
        <button data-toast="close-button" class="px-4 py-2 rounded-lg bg-gray-600 text-white hover:bg-gray-500 transition-colors">With Close Button</button>
        <button data-toast="long-duration" class="px-4 py-2 rounded-lg bg-gray-600 text-white hover:bg-gray-500 transition-colors">Long Duration (10s)</button>
        <button data-toast="persistent" class="px-4 py-2 rounded-lg bg-gray-600 text-white hover:bg-gray-500 transition-colors">Persistent (no dismiss)</button>
        <button data-toast="dismiss-all" class="px-4 py-2 rounded-lg bg-red-800 text-white hover:bg-red-700 transition-colors">Dismiss All</button>
      </div>
    </section>

  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
